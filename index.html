<!DOCTYPE html>
<html lang="PT-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Aventura</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
</head>
<body>
    <div id="bg_layer"></div>
    <div class="container" style="padding: 0%;">
        
        <div class="row" style="flex-wrap: nowrap;">
        
        <div class="col">
            <aside>
                <div class="setings" id="setings">
                    <h1><button onclick="display_notas()"><i class="fa-solid fa-angle-down" id="icone_nota"></i></button>Notes</h1>
                    <div class="notas" id = "notas" style="display: none;">
                        <hr>
                        <button onclick="abrir_popup()">New Note</button>
                        <hr>
                        <div id="colocar_notas">
                        </div>
                    </div>
                    <hr>
                    <h2><button onclick="display_color()"><i class="fa-solid fa-angle-down" id="icone_cor"></i></button> Color Palettes</h2>
                    <div class="colors" id="cores" style="display: none;">
                        <hr>
                        <button id="pa1"><b>Palette 1</b></button>
                        <button id="pa2"><b>Palette 2</b></button>
                        <button id="pa3"><b>Palette 3</b></button>
                        <button id="pa4"><b>Palette 4</b></button>
                        <button id="pa5"><b>Palette 5</b></button>

                    </div>
                    <hr>
                    <h3><button onclick="display_background()"><i class="fa-solid fa-angle-down" id="icone_bg"></i></button>Change Background</h3>
                    <div class="bg_image" id="background_change" style="display: none;">
                        <hr>
                        <button id="add_image">Change Background Image</button>
                        <button id="remove_image">Remove Background Image</button>
                       
                    </div>
                    <hr>
                   
                </div>
            </aside>
        </div>
        
        <div class="col">
            
            <div class="main_content" id="main">
                <div class="text_editor">
                    <div class="text_editor_header" id="header">
                        <button type="button" class="btn" data-element="bold">
                            <i class="fa fa-bold"></i>
                        </button>

                        <button type="button" class="btn" data-element="italic">
                            <i class="fa fa-italic"></i>
                        </button>

                        <button type="button" class="btn" data-element="underline">
                            <i class="fa fa-underline"></i>
                        </button>

                        <button type="button" class="btn" data-element="insertUnorderedList">
                            <i class="fa fa-list-ul"></i>
                        </button>

                        <button type="button" class="btn" data-element="insertOrderedList">
                            <i class="fa fa-list-ol"></i>
                        </button>

                        <button type="button" class="btn" data-element="createLink">
                            <i class="fa fa-link"></i>
                        </button>

                        <button type="button" class="btn" data-element="justifyLeft">
                            <i class="fa fa-align-left"></i>
                        </button>

                        <button type="button" class="btn" data-element="justifyCenter">
                            <i class="fa fa-align-center"></i>
                        </button>

                        <button type="button" class="btn" data-element="justifyRight">
                            <i class="fa fa-align-right"></i>
                        </button>

                        <button type="button" class="btn" data-element="justifyFull">
                            <i class="fa fa-align-justify"></i>
                        </button>

                        <button type="button" class="btn" data-element="h1">
                            <i class="fa fa-plus"></i>
                        </button>

                        <button type="button" class="btn" data-element="p">
                            <i class="fa fa-minus"></i>
                        </button>



                    </div>
                    <h1 id="titulo_da_nota" contenteditable="true">New Adventure</h1>
                    <div class="content" id="texto" contenteditable="true"></div>
                    <div class="text_editor_botton">
                        <span id="palavras">0 palavras</span>
                        <span id="caracteres">0 caracteres</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col">
            <aside>
                <div class="configs_rpg" id="configs_rpg">
                    <h2><button onclick="display_pdf()"><i class="fa-solid fa-angle-down" id="icone_pdf"></i></button> Insert a PDF Book</h2>
                    <div class="add_pdf" id="pdf_display"  style="display: none;">
                        
                        <hr>
                        <embed src="" type="application/pdf" width="100%" height="600vh" style="display: none;" id="arquivo_pdf"/>
                        
                        <input type="file" name="pdf_book" id="pdf_book" accept=".pdf">
                        <br>
                        
                    </div>
                    <hr>
                    <h2><button onclick="display_roll()"><i class="fa-solid fa-angle-down" id="icone_dice"></i></button>Roll Dice</h2>
                    <div class="rolar_dados" style="display: none;" id="dados">
                        <hr>
                        <button id="dado_d100" onclick="rolar_dados(100)">Roll D100</button>
                        <p id="d100"></p>
                        <button id="dado_d20" onclick="rolar_dados(20)">Roll D20</button>
                        <p id="d20"></p>
                        <button id="dado_d12" onclick="rolar_dados(12)">Roll D12</button>
                        <p id="d12"></p>
                        <button id="dado_d10" onclick="rolar_dados(10)">Roll D10</button>
                        <p id="d10"></p>
                        <button id="dado_d8" onclick="rolar_dados(8)">Roll D8</button>
                        <p id="d8"></p>
                        <button id="dado_d6" onclick="rolar_dados(6)">Roll D6</button>
                        <p id="d6"></p>
                        <button id="dado_d4" onclick="rolar_dados(4)">Roll D4</button>
                        <p id="d4"></p>
                    </div>
                    <hr>
                </div>
                
            </aside>
        </div>

        </div>
        
    </div>
    <div class="popup" id="popup">
        <h2>CHANGE BACKGROUND</h2>
        <input type="file" name="" id="input_background_image" accept="image/*">
        <br>
        <label for="opacity">Opacity</label>
        <input id = "opacity" type="range" name="opacity" step="0.01" min="0" max="1" value="1"> <br>
        <button id = confirmar_bg>Confirm</button>
        <button onclick="fechar_popup()">Return</button>
    </div>

    <div class="popup_nota" id="popup_nota">
        <h2>CREATE NEW NOTE</h2>
        <label for="titulo">Title</label>
        <input type="text" id="titulo_nota" name="titulo">
        <br><br>
        <button onclick="criar_nota()">Confirm</button>
        <button onclick="fechar_popup()">Return</button>
    </div>

    <div class="popup_apagar" id="popup_apagar">
        <h2>Do you REALLY want to DELETE this note?</h2>
        
        <button onclick="deletar_dados()">Confirm</button>
        <button onclick="fechar_popup()">NO</button>
        
    </div>
    
    
</body>
<script src="script.js"></script>
<script src="configs_rpg.js"></script>
<script src="dropdown.js"></script>
<script src="fundo.js"></script>
<script src="cores.js"></script>
<script src="novas_notas.js"></script>
<script src="https://kit.fontawesome.com/1e1383a7cf.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="salvar_dados.js"></script>
<script src="salvar_dados_pesados.js"></script>
</html>
